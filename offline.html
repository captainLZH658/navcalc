<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Offline - NavCalc</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;color:#333;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.icon{font-size:80px;margin-bottom:20px}
h1{font-size:24px;color:#1F4E79;margin-bottom:10px}
p{font-size:15px;color:#666;margin-bottom:8px;line-height:1.6}
.btn{display:inline-block;padding:14px 32px;margin-top:16px;background:#1F4E79;color:#fff;border:none;border-radius:8px;font-size:16px;text-decoration:none}
.btn:active{opacity:.85}
</style>
</head>
<body>
<div class="icon">⚓</div>
<h1>You're Offline</h1>
<p>Navigation Calculator tools are cached and<br>should work once loaded previously.</p>
<p style="font-size:13px;color:#999">Open the app from your home screen for best experience.</p>
<a class="btn" href="javascript:location.reload()">🔄 Try Again</a>
</body>
</html>
